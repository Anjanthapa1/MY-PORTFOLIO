<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial;
  background-image:linear-gradient(to right, purple, white);
  padding: 20px;
}

/* this style is using display:grid; property */

.container{
    display: grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr)) ;
    /* grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); is responsive for all devices with different width or size */
    grid-auto-rows:300px;
    gap: 5px;
}
.container img{
    width: 100%;
    height: 300px;
    object-fit: cover;
}
</style>
<body>
