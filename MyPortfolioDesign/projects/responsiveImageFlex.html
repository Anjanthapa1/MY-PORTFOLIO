<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial;
  background-image: linear-gradient(to right, purple, white);
  padding: 20px;
}

.container{
display:flex;
flex-direction: row;
flex-wrap:wrap;
column-gap:5px;
row-gap:5px;
}
.column{
flex:24%;  /*24% is used because it is nearly equal to 25% which is 1/4 th of 100% width*/
}

@media(max-width:1000px){
.column{
flex:32%;  /*32% is used because it is nearly equal to 33.33% which is 1/3 th of 100% width*/
}
}
@media(max-width:700px){
.column{
flex:48%; /*48% is used because it is nearly equal to 50% which is 1/2 th of 100% width*/
}
}
@media(max-width:500px){
.column{
flex:100%; /*100% is used because it is equal to 100% which is full width of screen*/
 }
} 

</style>
